<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深度爬虫调度矩阵 | Deep Crawler Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --glass-bg: rgba(255, 255, 255, 0.82);
            --glass-border: rgba(148, 163, 184, 0.22);
            --text-main: #111827;
            --text-muted: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #059669;
            --danger: #dc2626;
            --running: #2563eb;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 40px;
            background-image: radial-gradient(circle at top right, rgba(148, 163, 184, 0.14), transparent 420px),
                              radial-gradient(circle at bottom left, rgba(226, 232, 240, 0.85), transparent 420px);
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, #334155 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-link {
            background: rgba(255, 255, 255, 0.88);
            color: var(--primary);
            border: 1px solid rgba(37, 99, 235, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .nav-link:hover {
            background: rgba(37, 99, 235, 0.06);
            border-color: rgba(37, 99, 235, 0.35);
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(5, 150, 105, 0.12);
            color: var(--success);
            border: 1px solid rgba(5, 150, 105, 0.18);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-badge.error {
            background: rgba(220, 38, 38, 0.12);
            color: var(--danger);
            border-color: rgba(220, 38, 38, 0.18);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .top-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 18px 40px rgba(148, 163, 184, 0.14);
            animation: fadeIn 0.8s ease-out;
        }

        .panel-title {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* 爬虫卡片 */
        .spider-card {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .spider-card:hover {
            transform: translateY(-2px);
            border-color: rgba(37, 99, 235, 0.28);
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.08);
        }
        .spider-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .spider-info p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .btn-trigger {
            background: linear-gradient(135deg, var(--primary) 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.16);
        }
        .btn-trigger:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
        }
        .btn-trigger:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.88);
            color: var(--primary);
            border: 1px solid rgba(37, 99, 235, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary:disabled,
        .btn-trigger:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 运行状况表格 */
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }
        .log-table th {
            text-align: left;
            color: var(--text-muted);
            font-weight: 600;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .log-table td {
            padding: 15px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
            font-size: 0.95rem;
            vertical-align: top;
        }
        .log-table tr:last-child td {
            border-bottom: none;
        }

        .state-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .state-COMPLETED { background: rgba(5, 150, 105, 0.12); color: var(--success); }
        .state-FAILED { background: rgba(220, 38, 38, 0.12); color: var(--danger); }
        .state-RUNNING { background: rgba(37, 99, 235, 0.12); color: var(--running); }
        .state-SCHEDULED { background: rgba(245, 158, 11, 0.14); color: #b45309; }
        .state-PENDING { background: rgba(148, 163, 184, 0.14); color: var(--text-muted); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: currentColor;
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.35); }
            70% { box-shadow: 0 0 0 6px rgba(5, 150, 105, 0); }
            100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0); }
        }

        /* 加载动画 */
        .loader {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            border-radius: 14px;
            background: rgba(248, 250, 252, 0.92);
            border: 1px solid var(--glass-border);
        }

        .setting-text h3 {
            margin: 0 0 6px 0;
            font-size: 1.05rem;
        }

        .setting-text p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toggle-label {
            min-width: 52px;
            text-align: right;
            font-weight: 700;
            color: var(--text-main);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 58px;
            height: 32px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: rgba(220, 38, 38, 0.28);
            transition: .2s;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.25);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 4px;
            top: 3px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: rgba(5, 150, 105, 0.32);
        }

        input:checked + .slider:before {
            transform: translateX(25px);
        }

        .btn-refresh {
            background: rgba(255,255,255,0.88);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 22px;
        }

        .summary-card {
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.78);
        }

        .summary-card .label {
            color: var(--text-muted);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .summary-card .value {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1;
        }

        .value.ok { color: var(--success); }
        .value.bad { color: var(--danger); }
        .value.run { color: var(--running); }

        .mini-note {
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-bottom: 12px;
        }

        .run-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .run-meta {
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .notification {
            border-radius: 12px;
            padding: 12px 14px;
            background: rgba(248, 250, 252, 0.92);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
        }
        .notification.ok {
            color: var(--success);
            border-color: rgba(5, 150, 105, 0.18);
            background: rgba(5, 150, 105, 0.06);
        }
        .notification.bad {
            color: var(--danger);
            border-color: rgba(220, 38, 38, 0.18);
            background: rgba(220, 38, 38, 0.06);
        }

        @media (max-width: 1080px) {
            .top-grid,
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>深网捕获 · 指挥中心</h1>
        <div class="header-right">
            <a href="/generator.html" class="nav-link">AI 爬虫生成器 →</a>
            <div class="status-badge" id="api-status">
                <div class="pulse"></div> Prefect 核心引擎离线
            </div>
        </div>
    </div>

    <div class="top-grid">
        <div class="glass-panel">
            <h2 class="panel-title">控制开关</h2>
            <div class="setting-row">
                <div class="setting-text">
                    <h3>Kafka 推送</h3>
                    <p>关闭后保留 ClickHouse 入库，但不会继续向 Kafka 发送数据。</p>
                </div>
                <div class="toggle-wrap">
                    <span class="toggle-label" id="kafka-switch-label">读取中</span>
                    <label class="switch">
                        <input type="checkbox" id="kafka-switch" onchange="toggleKafka(this)">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <h2 class="panel-title">系统说明</h2>
            <div class="setting-row">
                <div class="setting-text">
                    <h3>运行时配置已接入</h3>
                    <p>开关写入共享配置文件，worker 无需重启即可读取最新值。</p>
                </div>
                <button class="btn-refresh" onclick="fetchDashboard()">立即刷新</button>
            </div>
        </div>
    </div>

    <div class="grid">
        <!-- 部署的爬虫列表 -->
        <div class="glass-panel">
            <h2 class="panel-title">📡 待命爬虫矩阵</h2>
            <div class="notification" id="action-notification"></div>
            <div id="deployments-container">
                <div class="loader">扫描节点队列中...</div>
            </div>
        </div>

        <!-- 历史运行记录 -->
        <div class="glass-panel">
            <h2 class="panel-title">⚡ 节点工况监控</h2>
            <div class="summary-grid" id="summary-container">
                <div class="summary-card"><div class="label">待命部署</div><div class="value">-</div></div>
                <div class="summary-card"><div class="label">运行中</div><div class="value">-</div></div>
                <div class="summary-card"><div class="label">24h 成功</div><div class="value">-</div></div>
                <div class="summary-card"><div class="label">24h 失败</div><div class="value">-</div></div>
            </div>
            <div class="mini-note">仅展示最近实际执行过的任务，不再混入未来调度中的 Scheduled 记录。</div>
            <table class="log-table">
                <thead>
                    <tr>
                        <th>任务</th>
                        <th>运行状态</th>
                        <th>触发方式</th>
                        <th>开始时间</th>
                        <th>耗时</th>
                    </tr>
                </thead>
                <tbody id="runs-container">
                    <tr><td colspan="5" class="loader">读取核心日志中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ────────────────────────────────────────────
        // 全局状态：记录正在操作中的 deployment id
        // 防止轮询 innerHTML 重绘时丢失按钮禁用态
        // ────────────────────────────────────────────
        const triggeringDeployments = new Set();
        const redeployingDeployments = new Set();
        let notificationTimer = null;

        // ── 安全工具：转义 HTML 特殊字符（含单引号），防止 XSS 与拼接断裂 ──
        function escapeHtml(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showNotification(message, type = '') {
            const box = document.getElementById('action-notification');
            box.className = `notification ${type}`.trim();
            box.innerText = message;
            box.style.display = 'block';
            clearTimeout(notificationTimer);
            notificationTimer = setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        function setActionButtonState(btn, text, type='') {
            btn.innerText = text;
            btn.style.opacity = '0.85';
            if (type === 'ok') {
                btn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                btn.style.color = '#fff';
                btn.style.borderColor = 'transparent';
            } else if (type === 'bad') {
                btn.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
                btn.style.color = '#fff';
                btn.style.borderColor = 'transparent';
            } else {
                btn.style.background = '';
                btn.style.color = '';
                btn.style.borderColor = '';
            }
        }

        function resetActionButton(btn, originalText) {
            btn.innerText = originalText;
            btn.disabled = false;
            btn.style.opacity = '';
            btn.style.background = '';
            btn.style.color = '';
            btn.style.borderColor = '';
        }

        async function fetchDashboard() {
            try {
                const res = await fetch('/api/dashboard_state');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                const statusBadge = document.getElementById('api-status');
                if (data.api_health === 'UP' && !data.error) {
                    statusBadge.innerHTML = '<div class="pulse"></div> Prefect 核心引擎已连接';
                    statusBadge.className = 'status-badge';
                } else {
                    statusBadge.innerHTML = '核心引擎离线 (' + escapeHtml(data.error || '连接失败') + ')';
                    statusBadge.className = 'status-badge error';
                }

                renderDeployments(data.deployments || []);
                renderFlowRuns(data.flow_runs || []);
                renderRunSummary(data.run_summary || {});
                renderSettings(data.settings || {});
            } catch (err) {
                // 网络断开或服务宕机时，明确呈现离线警告，不再静默失败
                const statusBadge = document.getElementById('api-status');
                statusBadge.innerHTML = '⚠️ 大屏网关失联（' + escapeHtml(err.message) + '）';
                statusBadge.className = 'status-badge error';
                console.error('获取大屏数据失败', err);
            }
        }

        function renderRunSummary(summary) {
            const container = document.getElementById('summary-container');
            const cards = [
                { label: '待命部署', value: summary.deployment_count ?? 0, cls: '' },
                { label: '运行中', value: summary.running_count ?? 0, cls: 'run' },
                { label: '24h 成功', value: summary.success_24h ?? 0, cls: 'ok' },
                { label: '24h 失败', value: summary.failed_24h ?? 0, cls: 'bad' },
            ];
            container.innerHTML = cards.map(card => `
                <div class="summary-card">
                    <div class="label">${escapeHtml(card.label)}</div>
                    <div class="value ${card.cls}">${card.value}</div>
                </div>
            `).join('');
        }

        function renderSettings(settings) {
            const enabled = settings.enable_kafka !== false;
            const input = document.getElementById('kafka-switch');
            const label = document.getElementById('kafka-switch-label');
            // 开关不处于提交中时才更新 UI，避免覆盖"保存中"状态
            if (!input.disabled) {
                input.checked = enabled;
                label.innerText = enabled ? '开启' : '关闭';
                label.style.color = enabled ? 'var(--success)' : 'var(--danger)';
            }
        }

        function renderDeployments(deps) {
            const container = document.getElementById('deployments-container');
            if (deps.length === 0) {
                container.innerHTML = '<div class="loader">当前暂无注册的爬虫，请在终端执行 deploy_all.py 注册任务。</div>';
                return;
            }

            // ── 构建新 HTML（由 data 属性传参，彻底告别 onclick 内拼字符串 ──
            let html = '';
            deps.forEach(dep => {
                const displayName = escapeHtml(dep.display_name || dep.name);
                const depName = escapeHtml(dep.name);
                const depId = escapeHtml(dep.id);

                // 根据全局操作集合决定按钮当前状态，保持轮询刷新后的视觉连贯性
                const isTriggeringNow = triggeringDeployments.has(dep.id);
                const isRedeployingNow = redeployingDeployments.has(dep.name);

                const triggerDisabled = isTriggeringNow ? 'disabled' : '';
                const triggerText = isTriggeringNow ? '运行中...' : '立即运行';
                const redeployDisabled = isRedeployingNow ? 'disabled' : '';
                const redeployText = isRedeployingNow ? '部署中...' : '重新部署';

                html += `
                    <div class="spider-card">
                        <div class="spider-info">
                            <h3>${displayName}</h3>
                            <p>部署标识: ${depName}</p>
                        </div>
                        <div class="card-actions">
                            <button class="btn-secondary"
                                data-dep-name="${depName}"
                                onclick="redeploySpider(this)"
                                ${redeployDisabled}>${redeployText}</button>
                            <button class="btn-trigger"
                                data-dep-id="${depId}"
                                onclick="triggerSpider(this)"
                                ${triggerDisabled}>${triggerText}</button>
                        </div>
                    </div>
                `;
            });

            // ── 内容比对：有变化才写入 DOM，保护用户正在进行中的文字选区 ──
            if (container.innerHTML !== html) {
                container.innerHTML = html;
            }
        }

        function renderFlowRuns(runs) {
            const container = document.getElementById('runs-container');
            if (runs.length === 0) {
                container.innerHTML = '<tr><td colspan="5" class="loader">暂无实际执行记录</td></tr>';
                return;
            }

            let html = '';
            runs.forEach(run => {
                const date = new Date(run.start_time || run.created).toLocaleString();
                const stat = run.state_name ? run.state_name.toUpperCase() : 'UNKNOWN';
                const duration = Number(run.duration_seconds || 0);
                const durationText = duration <= 0 ? '-' : (duration < 60 ? `${duration.toFixed(1)}s` : `${(duration / 60).toFixed(1)}m`);

                html += `
                    <tr>
                        <td>
                            <div class="run-name">${escapeHtml(run.display_name || run.name)}</div>
                            <div class="run-meta">#${escapeHtml(run.id.substring(0, 8))}</div>
                        </td>
                        <td><span class="state-tag state-${escapeHtml(stat)}">${escapeHtml(stat)}</span></td>
                        <td style="color: var(--text-muted); font-size: 0.85rem">${escapeHtml(run.trigger_label || '-')}</td>
                        <td style="color: var(--text-muted); font-size: 0.85rem">${escapeHtml(date)}</td>
                        <td style="color: var(--text-muted); font-size: 0.85rem">${escapeHtml(durationText)}</td>
                    </tr>
                `;
            });

            // ── 内容比对：有变化才写入，避免打断用户对日志文字的复制操作 ──
            if (container.innerHTML !== html) {
                container.innerHTML = html;
            }
        }

        // ── 立即运行：从 data-dep-id 读取 id，避免 onclick 字符串拼接 ──
        async function triggerSpider(btn) {
            const depId = btn.dataset.depId;
            const originalText = btn.innerText;
            btn.disabled = true;
            triggeringDeployments.add(depId);
            setActionButtonState(btn, '运行中...');

            try {
                const res = await fetch('/api/trigger/' + depId, { method: 'POST' });
                const data = await res.json().catch(() => ({}));
                if (res.ok) {
                    setActionButtonState(btn, '运行已创建', 'ok');
                    showNotification(`已创建运行任务，flow run: ${data?.data?.id || '-'}`, 'ok');
                    setTimeout(() => fetchDashboard(), 1000);
                } else {
                    setActionButtonState(btn, '运行失败', 'bad');
                    showNotification(`立即运行失败：${data.detail || '请求未成功'}`, 'bad');
                }
            } catch (e) {
                setActionButtonState(btn, '运行失败', 'bad');
                showNotification(`立即运行失败：${e.message}`, 'bad');
            }

            setTimeout(() => {
                triggeringDeployments.delete(depId);
                resetActionButton(btn, originalText);
            }, 3000);
        }

        // ── 重新部署：从 data-dep-name 读取 name，避免 onclick 字符串拼接 ──
        async function redeploySpider(btn) {
            const deploymentName = btn.dataset.depName;
            const originalText = btn.innerText;
            btn.disabled = true;
            redeployingDeployments.add(deploymentName);
            setActionButtonState(btn, '部署中...');

            try {
                const res = await fetch('/api/redeploy/' + encodeURIComponent(deploymentName), { method: 'POST' });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || '重新部署失败');
                }
                setActionButtonState(btn, '已提交', 'ok');
                showNotification(`${deploymentName} 已提交重新部署，worker 将执行 ${data.deploy_script}。`, 'ok');
                setTimeout(() => fetchDashboard(), 1000);
            } catch (e) {
                setActionButtonState(btn, '部署失败', 'bad');
                showNotification(`重新部署失败：${e.message}`, 'bad');
            }

            setTimeout(() => {
                redeployingDeployments.delete(deploymentName);
                resetActionButton(btn, originalText);
            }, 3000);
        }

        async function toggleKafka(input) {
            const enabled = input.checked;
            const label = document.getElementById('kafka-switch-label');
            // 禁用开关防止连点竞态
            input.disabled = true;
            label.innerText = '保存中';
            try {
                const res = await fetch('/api/settings/kafka', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enable_kafka: enabled })
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || '保存失败');
                }
                // POST 返回的 settings 直接复用，不再发多余的 GET /api/settings
                renderSettings(data.settings || { enable_kafka: enabled });
            } catch (e) {
                // 还原 UI 到操作前状态
                input.checked = !enabled;
                renderSettings({ enable_kafka: !enabled });
                alert('Kafka 开关更新失败：' + e.message);
            } finally {
                input.disabled = false;
            }
        }

        fetchDashboard();
        setInterval(fetchDashboard, 5000);
    </script>
</body>
</html>
